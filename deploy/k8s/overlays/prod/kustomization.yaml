apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: financetracker-prod

resources:
  - ../../base
  - namespace.yaml
  - ingress.yaml

configMapGenerator:
  - name: app-config
    literals:
      - ASPNETCORE_ENVIRONMENT=Production

# Secrets are created manually on the cluster (not in git):
#   kubectl -n financetracker-prod create secret generic postgres-credentials \
#     --from-literal=POSTGRES_USER=... --from-literal=POSTGRES_PASSWORD=... --from-literal=POSTGRES_DB=...
#   kubectl -n financetracker-prod create secret generic app-secrets \
#     --from-literal=CONNECTION_STRING="Host=postgres;Port=5432;Database=...;Username=...;Password=..."

images:
  - name: ghcr.io/dreyssechris/finance-tracker-api
    newTag: v0.2.0
  - name: ghcr.io/dreyssechris/finance-tracker-web
    newTag: v0.2.0
