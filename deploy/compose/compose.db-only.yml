services:
  db:
    image: postgres:16-alpine
    container_name: choam-pg
    restart: unless-stopped
    env_file:
      - ../../.env
    volumes:
      - pg-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: choam-pgadmin
    restart: unless-stopped
    env_file:
      - ../../.env
    ports:
      - "8081:80"
    depends_on:
      - db

volumes:
  pg-data:
