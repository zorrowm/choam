name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-frontend:
    name: Lint & Type-Check Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/choam-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/choam-web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx vue-tsc --noEmit

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet restore Choam.slnx
      - run: dotnet build Choam.slnx --no-restore -c Release
