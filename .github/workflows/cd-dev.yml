name: CD Dev

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/dreyssechris/choam-api
  WEB_IMAGE: ghcr.io/dreyssechris/choam-web

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: src/
          file: src/Choam.Presentation/Dockerfile
          target: prod
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.API_IMAGE }}:dev
            ${{ env.API_IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web image
        uses: docker/build-push-action@v6
        with:
          context: src/choam-web
          file: src/choam-web/Dockerfile
          target: prod
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:dev
            ${{ env.WEB_IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Checkout homelab repo
        uses: actions/checkout@v4
        with:
          repository: dreyssechris/homelab
          token: ${{ secrets.HOMELAB_PAT }}
          path: homelab

      - name: Update dev image tags in homelab
        run: |
          sed -i "s|newTag: .*|newTag: sha-${{ github.sha }}|g" \
            homelab/deploy/k8s/apps/choam/overlays/dev/kustomization.yaml

      - name: Commit and push to homelab
        run: |
          cd homelab
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/k8s/apps/choam/overlays/dev/kustomization.yaml
          git diff --staged --quiet || git commit -m "chore(deploy): update choam dev to sha-${{ github.sha }}"
          git push
